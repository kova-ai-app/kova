app = "kova-worker"
primary_region = "sjc"

[build]
  dockerfile = "../Dockerfile"

[env]
  BULL_BOARD_PORT = "3001"
  NODE_ENV = "production"

# No public HTTP services — this is a background worker.
# Bull Board runs on 3001 internally for debugging via `fly proxy 3001`.

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
