name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  # Stub values so typecheck/build don't fail on missing env vars
  DATABASE_URL: "postgres://stub:stub@localhost/stub"
  DATABASE_URL_UNPOOLED: "postgres://stub:stub@localhost/stub"
  REDIS_URL: "redis://localhost:6379"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
  CLERK_SECRET_KEY: "sk_test_stub"
  CLERK_WEBHOOK_SECRET: "whsec_stub"
  AWS_ACCESS_KEY_ID: "stub"
  AWS_SECRET_ACCESS_KEY: "stub"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "stub"
  DEEPGRAM_API_KEY: "stub"
  OPENAI_API_KEY: "sk-stub"
  SENTRY_DSN: ""
  NEXT_PUBLIC_SENTRY_DSN: ""
  EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
  EXPO_PUBLIC_SENTRY_DSN: ""
  APP_ENV: "development"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Check migration drift
        run: |
          pnpm --filter @kova/db exec drizzle-kit generate
          git diff --exit-code packages/db/src/migrations/

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        continue-on-error: true  # No tests yet in Week 1; remove when Week 4+ tests are added
