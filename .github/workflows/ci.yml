name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  # Stub values — typecheck/lint/test work without a real DB.
  # When NEON_API_KEY is set as a GitHub secret, the Neon steps below
  # override DATABASE_URL / DATABASE_URL_UNPOOLED with a real test branch.
  DATABASE_URL: "postgres://stub:stub@localhost/stub"
  DATABASE_URL_UNPOOLED: "postgres://stub:stub@localhost/stub"
  REDIS_URL: "redis://localhost:6379"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
  CLERK_SECRET_KEY: "sk_test_stub"
  CLERK_WEBHOOK_SECRET: "whsec_stub"
  AWS_ACCESS_KEY_ID: "stub"
  AWS_SECRET_ACCESS_KEY: "stub"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "stub"
  DEEPGRAM_API_KEY: "stub"
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  LLM_PROVIDER: "openrouter"
  LLM_MODEL: "openai/gpt-oss-120b:free"
  SENTRY_DSN: ""
  NEXT_PUBLIC_SENTRY_DSN: ""
  EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
  EXPO_PUBLIC_SENTRY_DSN: ""
  APP_ENV: "test"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  # Mapped from secrets — empty string when not configured (steps check this)
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Check migration drift
        run: |
          pnpm --filter @kova/db exec drizzle-kit generate
          git diff --exit-code packages/db/src/migrations/

      - name: Lint
        run: pnpm lint

      # -------------------------------------------------------------------------
      # Neon test branch — only runs when NEON_API_KEY secret is configured.
      # TODO: Add NEON_API_KEY and NEON_PROJECT_ID to GitHub Actions secrets
      #       (Settings → Secrets → Actions) once the Neon project is created.
      # -------------------------------------------------------------------------

      - name: Create Neon test branch
        id: neon-branch
        if: env.NEON_API_KEY != ''
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Override DATABASE_URL with Neon test branch
        if: env.NEON_API_KEY != '' && steps.neon-branch.outputs.db_url != ''
        run: |
          echo "DATABASE_URL=${{ steps.neon-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV
          echo "DATABASE_URL_UNPOOLED=${{ steps.neon-branch.outputs.db_url }}" >> $GITHUB_ENV

      - name: Run migrations against Neon test branch
        if: env.NEON_API_KEY != '' && steps.neon-branch.outputs.db_url != ''
        run: pnpm --filter @kova/db db:migrate

      - name: Test
        run: pnpm test

      # -------------------------------------------------------------------------
      # Cleanup — always delete the Neon branch even if tests fail
      # -------------------------------------------------------------------------

      - name: Delete Neon test branch
        if: always() && env.NEON_API_KEY != '' && steps.neon-branch.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch_id: ${{ steps.neon-branch.outputs.branch_id }}
          api_key: ${{ env.NEON_API_KEY }}
